services:
  ride-the-bus:
    image: ghcr.io/balazsfoldi/ride-the-bus:latest
    container_name: ride-the-bus
    restart: unless-stopped
    environment:
      - ROOM_ACCESS_CODE=${ROOM_ACCESS_CODE:-}
      - MAX_PLAYERS=${MAX_PLAYERS:-12}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: ride-the-bus-caddy
    restart: unless-stopped
    depends_on:
      - ride-the-bus
    ports:
      - "80:80"
      - "443:443"
    environment:
      - RIDE_THE_BUS_DOMAIN=${RIDE_THE_BUS_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ride-the-bus-watchtower
    restart: unless-stopped
    command: --interval ${WATCHTOWER_POLL_INTERVAL:-300} --cleanup --label-enable
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.44}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
